# Builds the exampleSite once per color scheme and publishes a combined demo
# to GitHub Pages: a landing page at / linking to /dark/, /light/, /classic/
# and /white/ — mirroring the original Hexo theme's gh-pages layout.
#
# One-time setup: repo Settings → Pages → Build and deployment →
# Source = "GitHub Actions".
name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Must be >= theme.toml min_version. Theme requires Hugo extended + Dart Sass.
      HUGO_VERSION: 0.163.3
    steps:
      - name: Install Hugo CLI (extended)
        run: |
          wget -O "${{ runner.temp }}/hugo.deb" \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"
      - name: Install Dart Sass
        run: sudo snap install dart-sass
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build every color scheme
        working-directory: exampleSite
        env:
          HUGO_ENVIRONMENT: production
          # e.g. https://iahsanujunda.github.io/hugo-theme-cactus
          BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          for scheme in dark light classic white; do
            echo "::group::Building $scheme scheme"
            HUGO_PARAMS_COLORSCHEME="$scheme" \
            hugo \
              --themesDir ../.. \
              --baseURL "$BASE_URL/$scheme/" \
              --destination "public/$scheme" \
              --gc --minify
            echo "::endgroup::"
          done
      - name: Add landing page
        run: cp demo/index.html exampleSite/public/index.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: exampleSite/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
