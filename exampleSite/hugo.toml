baseURL = "https://example.com/"
locale = "en-us"
title = "Cactus"
theme = "hugo-theme-cactus"
# theme = "cactus"  # when consumed as a Hugo module
enableEmoji = true

[pagination]
  pagerSize = 8        # matches the demo: 8 posts on archive page 1, 6 on page 2

# Hexo `nav` map → menu (rendered in step 2 header).
[menus]
  [[menus.main]]
    name = "home"
    url = "/"
    weight = 1
  [[menus.main]]
    name = "about"
    url = "/about/"
    weight = 2
  [[menus.main]]
    name = "articles"
    url = "/posts/"
    weight = 3
  [[menus.main]]
    name = "projects"
    url = "http://github.com/probberechts"
    weight = 4
  [[menus.main]]
    name = "search"
    url = "/search/"
    weight = 5

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.highlight]
    style = "monokai"          # §8 — Chroma replaces the 70 Hexo highlight themes
    lineNos = false
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true              # allow raw HTML in markdown (Hexo default)

# Custom search index — §9. JSON output on the home page → /index.json.
[outputs]
  home = ["HTML", "RSS", "JSON"]

# ───────────────────────────────────────────────────────────────────────
# Theme options — all Hexo `theme.*` / `_config.yml` keys move under [params].
# ───────────────────────────────────────────────────────────────────────
[params]
  author = "Pieter Robberechts"
  description = "Hi, I'm a theme for the Hexo blogging framework. I'm particularly great for a personal web page with a simple blog. In this paragraph, you can provide some information about yourself. Below, your most recent or highlighted writings and projects are listed."
  dateFormat = "2 Jan 2006"        # matches the demo, e.g. "14 Nov 2016"
  direction = "ltr"                 # "rtl" loads the Vazir font
  projectsUrl = "http://github.com/probberechts"

  # Look & feel (injected into Sass via css.Sass `vars` — §6)
  colorscheme = "dark"              # dark | light | classic | white
  pageWidth = 48                    # rem
  # highlight = "rainbow"           # (Chroma style is set under [markup.highlight] instead)

  rss = true

  # Open Graph / social metadata (Hexo `open_graph` block → opengraph.html)
  [params.openGraph]
    fbAppId = ""
    fbAdmins = ""
    twitterId = ""

  [params.logo]
    enabled = true
    width = 50
    height = 50
    url = "/images/logo.png"
    gravatar = false
    grayout = true

  [params.favicon]
    [params.favicon.desktop]
      url = "/images/favicon.ico"
    [params.favicon.android]
      url = "/images/favicon-192x192.png"
    [params.favicon.apple]
      url = "/images/apple-touch-icon.png"

  [params.gravatar]
    email = "name@email.com"
    hash = "d41d8cd98f00b204e9800998ecf8427e"

  # Home overview (§3)
  [params.tagsOverview]
    enabled = false
  [params.postsOverview]
    showAllPosts = false
    postCount = 5
    sortUpdated = false
  [params.archive]
    sortUpdated = false
  [params.post]
    showUpdated = false

  [params.copyright]
    startYear = 2016
    # endYear =                     # blank → current year

  [params.error404]
    enabled = true
    title = "404 Page Not Found"
    description = "The page you are looking for might have been removed, had its name changed, or is temporarily unavailable."

  # Plugins / integrations (§9)
  [params.mathjax]
    enabled = false
  [params.disqus]
    enabled = false
    shortname = "cactus-1"
  [params.utterances]
    enabled = false
    repo = "owner/githubrepo"
    issueTerm = "pathname"
    label = "Comment"
    theme = "github-dark"
  [params.googleAnalytics]
    enabled = false
    id = "UA-86660611-1"
  [params.baiduAnalytics]
    enabled = false
    id = "2e6da3c375c8a87f5b664cea6d4cb29c"
  [params.cloudflareAnalytics]
    enabled = false
    id = "0dabb6e21848405483a237e6a7b6ed04"
  [params.umamiAnalytics]
    enabled = false
    id = "e77e68be-f6e4-4br3-9365-2b76b57cd571"
    host = "https://analytics.domain.com"
    scriptName = "umami.js"

  # CDN vs local assets (§7 cdn.js). Mirrors the original Hexo defaults so
  # Font Awesome / justified-gallery load without bundling lib/ locally.
  [params.cdn]
    enable = true
    fontAwesome = "https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    # clipboard & justified-gallery are no longer needed — copy button uses the
    # native Clipboard API and the gallery is vanilla CSS+JS (§8).

  # Social links — Hexo `social_links` array → array-of-tables.
  [[params.socialLinks]]
    icon = "github"
    link = "https://github.com/probberechts/hexo-theme-cactus"
  [[params.socialLinks]]
    icon = "mail"
    link = "mailto:name@email.com"
  [[params.socialLinks]]
    icon = "mastodon"
    label = "mastodon.social"
    link = "https://mastodon.social/@alice"
